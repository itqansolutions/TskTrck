<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Task Milestone Tracker | مُتتبع المهام</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════
   THEME VARIABLES
══════════════════════════════════════ */
:root {
  --radius: 18px;
  --radius-sm: 12px;
  --font-en: 'Sora', sans-serif;
  --font-ar: 'Cairo', sans-serif;
}

/* 🌸 Girl Theme (default) */
body.theme-girl {
  --bg: #fdf4f8;
  --card: #ffffff;
  --card2: #fce4ef;
  --accent: #e0559a;
  --accent2: #f48fb1;
  --accent3: #a78bfa;
  --accent4: #fb7bb8;
  --text: #4a2040;
  --text2: #a07090;
  --border: #f0c4d8;
  --danger: #e53e75;
  --success: #7ecda4;
  --shadow: 0 8px 32px rgba(224,85,154,0.10);
  --shadow-hover: 0 16px 48px rgba(224,85,154,0.20);
  --mesh1: rgba(244,143,177,0.25);
  --mesh2: rgba(167,139,250,0.20);
  --mesh3: rgba(251,123,184,0.08);
  --logo-shadow: rgba(224,85,154,0.35);
  --focus-ring: rgba(224,85,154,0.18);
  --btn-create: linear-gradient(135deg,#e0559a,#c2185b);
  --btn-finish: linear-gradient(135deg,#f48fb1,#a78bfa);
  --btn-reset-bg: linear-gradient(135deg,#e53e75,#c2185b);
  --progress: linear-gradient(90deg,#e0559a,#a78bfa);
  --check-bg: linear-gradient(135deg,#e0559a,#fb7bb8);
  --ms-check-bg: linear-gradient(135deg,#e0559a,#fb7bb8);
  --seq-bg: rgba(224,85,154,0.10);
  --seq-color: #e0559a;
  --seq-border: rgba(224,85,154,0.25);
  --ms-hover-bg: rgba(224,85,154,0.05);
  --ms-done-bg: rgba(224,85,154,0.04);
  --ms-done-border: rgba(224,85,154,0.25);
  --add-ms-bg: rgba(224,85,154,0.07);
  --theme-icon: "🌸";
}

/* 🚀 Boy Theme */
body.theme-boy {
  --bg: #f0f4ff;
  --card: #ffffff;
  --card2: #dde8ff;
  --accent: #2563eb;
  --accent2: #60a5fa;
  --accent3: #0ea5e9;
  --accent4: #06b6d4;
  --text: #0f1f4a;
  --text2: #5a7aaa;
  --border: #bfd3f7;
  --danger: #dc2626;
  --success: #16a34a;
  --shadow: 0 8px 32px rgba(37,99,235,0.10);
  --shadow-hover: 0 16px 48px rgba(37,99,235,0.20);
  --mesh1: rgba(96,165,250,0.20);
  --mesh2: rgba(14,165,233,0.15);
  --mesh3: rgba(6,182,212,0.07);
  --logo-shadow: rgba(37,99,235,0.30);
  --focus-ring: rgba(37,99,235,0.18);
  --btn-create: linear-gradient(135deg,#2563eb,#1d4ed8);
  --btn-finish: linear-gradient(135deg,#0ea5e9,#06b6d4);
  --btn-reset-bg: linear-gradient(135deg,#dc2626,#b91c1c);
  --progress: linear-gradient(90deg,#2563eb,#06b6d4);
  --check-bg: linear-gradient(135deg,#2563eb,#0ea5e9);
  --ms-check-bg: linear-gradient(135deg,#2563eb,#06b6d4);
  --seq-bg: rgba(37,99,235,0.10);
  --seq-color: #2563eb;
  --seq-border: rgba(37,99,235,0.25);
  --ms-hover-bg: rgba(37,99,235,0.05);
  --ms-done-bg: rgba(37,99,235,0.04);
  --ms-done-border: rgba(37,99,235,0.22);
  --add-ms-bg: rgba(37,99,235,0.07);
  --theme-icon: "🚀";
}

/* ══════════════════════════════════════
   BASE
══════════════════════════════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-en);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  transition: background 0.4s, color 0.3s;
}
body.ar { font-family: var(--font-ar); direction: rtl; }

body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 10% 0%, var(--mesh1) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 90% 85%, var(--mesh2) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 50% 50%, var(--mesh3) 0%, transparent 70%);
  pointer-events:none; z-index:0;
  transition: background 0.4s;
}

.app {
  position:relative; z-index:1;
  max-width:680px; margin:0 auto;
  padding:20px 14px 110px;
}

/* ══════════════════════════════════════
   HEADER
══════════════════════════════════════ */
.header {
  display:flex; align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
  flex-wrap:wrap; gap:10px;
}

.logo { display:flex; align-items:center; gap:10px; }
.logo-icon {
  width:42px; height:42px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius:13px;
  display:flex; align-items:center; justify-content:center;
  font-size:20px;
  box-shadow: 0 4px 14px var(--logo-shadow);
  flex-shrink:0;
  transition: background 0.4s, box-shadow 0.4s;
}
.logo-text h1 {
  font-size:1.2rem; font-weight:800;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  line-height:1.2;
  transition: background 0.4s;
}
.logo-text p { font-size:0.68rem; color:var(--text2); margin-top:2px; }

.header-actions { display:flex; gap:7px; align-items:center; flex-wrap:wrap; }

/* ── Theme Toggler ── */
.theme-toggle {
  display:flex; align-items:center;
  background: var(--card);
  border:1.5px solid var(--border);
  border-radius:50px;
  padding:3px;
  gap:3px;
}
.theme-btn {
  border:none; cursor:pointer; border-radius:50px;
  padding:5px 13px; font-size:0.78rem; font-weight:700;
  font-family:inherit; transition:all 0.25s;
  background:transparent; color:var(--text2);
}
.theme-btn.active {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color:#fff;
  box-shadow: 0 3px 10px var(--logo-shadow);
}

.btn-lang {
  background:var(--card); border:1.5px solid var(--border);
  color:var(--text); border-radius:50px; padding:6px 15px;
  font-size:0.78rem; font-weight:600; cursor:pointer;
  transition:all 0.2s; font-family:inherit;
}
.btn-lang:hover { border-color:var(--accent); color:var(--accent); }

.btn-reset {
  background: var(--btn-reset-bg);
  border:none; color:#fff; border-radius:50px;
  padding:6px 15px; font-size:0.78rem; font-weight:600;
  cursor:pointer; transition:all 0.2s; font-family:inherit;
  box-shadow:0 3px 10px rgba(220,38,38,0.22);
}
.btn-reset:hover { transform:translateY(-2px); }

/* ══════════════════════════════════════
   SECTION LABEL
══════════════════════════════════════ */
.section-label {
  font-size:0.66rem; font-weight:700;
  letter-spacing:0.13em; text-transform:uppercase;
  color:var(--accent); margin-bottom:9px;
}

/* ══════════════════════════════════════
   CREATE CARD
══════════════════════════════════════ */
.create-card {
  background:var(--card); border:1.5px solid var(--border);
  border-radius:var(--radius); padding:20px;
  margin-bottom:22px; box-shadow:var(--shadow);
  transition:box-shadow 0.3s, background 0.4s, border 0.4s;
}
.create-card:hover { box-shadow:var(--shadow-hover); }

.input-group { margin-bottom:15px; }
.input-group label {
  display:block; font-size:0.76rem; font-weight:600;
  color:var(--text2); margin-bottom:6px;
}
.input-group input[type="text"],
.milestone-row input[type="text"] {
  width:100%; background:var(--bg);
  border:1.5px solid var(--border); border-radius:var(--radius-sm);
  padding:11px 14px; color:var(--text);
  font-size:0.9rem; font-family:inherit; outline:none;
  transition:border-color 0.2s, box-shadow 0.2s;
}
.input-group input:focus,
.milestone-row input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--focus-ring); }

/* milestone rows */
.milestones-builder { margin-bottom:14px; }
.milestones-builder > label {
  display:block; font-size:0.76rem; font-weight:600;
  color:var(--text2); margin-bottom:8px;
}
.milestone-row {
  display:grid; grid-template-columns:1fr 54px 34px;
  gap:7px; align-items:center; margin-bottom:8px;
  animation:fadeSlide 0.25s ease;
}
@keyframes fadeSlide {
  from{opacity:0;transform:translateY(-7px)}
  to{opacity:1;transform:translateY(0)}
}
.seq-input {
  background:var(--bg)!important; border:1.5px solid var(--border)!important;
  border-radius:var(--radius-sm)!important; padding:11px 4px!important;
  color:var(--accent)!important; font-size:0.88rem!important;
  font-weight:700!important; font-family:inherit!important;
  width:100%!important; text-align:center; outline:none;
  -moz-appearance:textfield; transition:border-color 0.2s;
}
.seq-input::-webkit-outer-spin-button,
.seq-input::-webkit-inner-spin-button{-webkit-appearance:none}
.seq-input:focus { border-color:var(--accent)!important; }

.btn-remove-ms {
  background:rgba(220,38,38,0.09); border:none; color:var(--danger);
  width:34px; height:34px; border-radius:9px; cursor:pointer;
  font-size:0.95rem; display:flex; align-items:center; justify-content:center;
  transition:background 0.2s; flex-shrink:0;
}
.btn-remove-ms:hover { background:rgba(220,38,38,0.2); }

.btn-add-ms {
  display:flex; align-items:center; gap:6px;
  background:var(--add-ms-bg); border:1.5px dashed var(--accent);
  color:var(--accent); border-radius:var(--radius-sm);
  padding:9px 14px; font-size:0.82rem; font-weight:600;
  cursor:pointer; width:100%; font-family:inherit;
  transition:background 0.2s; margin-bottom:14px;
}
.btn-add-ms:hover { filter:brightness(0.95); }

.btn-create {
  width:100%; background:var(--btn-create);
  border:none; color:#fff; border-radius:var(--radius-sm);
  padding:13px; font-size:0.95rem; font-weight:700;
  cursor:pointer; font-family:inherit;
  box-shadow:0 5px 18px var(--logo-shadow);
  transition:all 0.2s;
}
.btn-create:hover { transform:translateY(-2px); filter:brightness(1.05); }
.btn-create:active { transform:translateY(0); }

/* ══════════════════════════════════════
   TASKS LIST VIEW
══════════════════════════════════════ */
.tasks-empty {
  text-align:center; color:var(--text2);
  padding:40px 20px;
  background:var(--card); border:1.5px dashed var(--border);
  border-radius:var(--radius);
}
.tasks-empty .ei { font-size:2.8rem; margin-bottom:10px; }
.tasks-empty p { font-size:0.88rem; line-height:1.6; }

/* Task Card */
.task-card {
  background:var(--card); border:1.5px solid var(--border);
  border-radius:var(--radius); margin-bottom:12px;
  box-shadow:var(--shadow); overflow:hidden;
  transition:box-shadow 0.3s, border 0.3s, transform 0.2s;
  animation:fadeSlide 0.3s ease;
}
.task-card:hover { box-shadow:var(--shadow-hover); transform:translateY(-1px); }
.task-card.completed { border-color:rgba(22,163,74,0.35); }

/* ── Task Row (always visible) ── */
.task-row {
  display:grid;
  grid-template-columns:auto 1fr auto auto auto;
  align-items:center;
  gap:10px;
  padding:14px 16px;
  cursor:pointer;
  user-select:none;
  transition:background 0.15s;
}
.task-row:hover { background:rgba(0,0,0,0.018); }

/* circle checkbox */
.task-check {
  width:28px; height:28px; border-radius:50%;
  border:2.5px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; flex-shrink:0;
  transition:all 0.25s; background:transparent;
  cursor:pointer;
}
.task-check.done {
  background:var(--check-bg);
  border-color:transparent;
  color:#fff;
  box-shadow:0 0 12px var(--logo-shadow);
}

/* task name + pill */
.task-meta { display:flex; flex-direction:column; gap:3px; min-width:0; }
.task-name {
  font-size:0.95rem; font-weight:700; color:var(--text);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.task-name.striked { text-decoration:line-through; color:var(--text2); }

/* milestone count pill */
.ms-count-pill {
  display:inline-flex; align-items:center; gap:5px;
  background:var(--seq-bg); color:var(--seq-color);
  border:1px solid var(--seq-border);
  border-radius:50px; padding:2px 10px;
  font-size:0.7rem; font-weight:700; width:fit-content;
}
.ms-count-pill .pbar {
  width:50px; height:4px; background:var(--border);
  border-radius:50px; overflow:hidden;
}
.ms-count-pill .pbar-fill {
  height:100%; border-radius:50px;
  background:var(--progress);
  transition:width 0.4s cubic-bezier(.4,0,.2,1);
}

/* delete button */
.btn-del {
  background:transparent; border:none; color:var(--text2);
  width:32px; height:32px; border-radius:8px;
  cursor:pointer; font-size:0.9rem;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s; flex-shrink:0;
}
.btn-del:hover { background:rgba(220,38,38,0.1); color:var(--danger); }

/* expand arrow */
.expand-icon {
  color:var(--text2); font-size:0.7rem;
  transition:transform 0.3s; flex-shrink:0;
  line-height:1;
}
.task-card.open .expand-icon { transform:rotate(180deg); }

/* ── Milestones Panel ── */
.ms-panel {
  max-height:0; overflow:hidden;
  transition:max-height 0.38s cubic-bezier(.4,0,.2,1), padding 0.3s;
  border-top:0px solid var(--border);
}
.task-card.open .ms-panel {
  max-height:1000px;
  border-top:1.5px solid var(--border);
  padding:12px 14px 0;
}

.ms-item {
  display:flex; align-items:center; gap:10px;
  background:var(--bg); border:1.5px solid var(--border);
  border-radius:var(--radius-sm); padding:11px 13px;
  margin-bottom:8px; cursor:pointer;
  transition:all 0.2s; user-select:none;
}
.ms-item:hover { border-color:var(--accent); background:var(--ms-hover-bg); }
.ms-item.ms-done { border-color:var(--ms-done-border); background:var(--ms-done-bg); }

.ms-check {
  width:22px; height:22px; border-radius:7px;
  border:2px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; flex-shrink:0; transition:all 0.2s; color:#fff;
}
.ms-done .ms-check {
  background:var(--ms-check-bg); border-color:transparent;
  box-shadow:0 0 9px var(--logo-shadow);
}

.ms-label { flex:1; min-width:0; }
.ms-name {
  font-size:0.88rem; font-weight:600; color:var(--text);
}
.ms-done .ms-name { text-decoration:line-through; color:var(--text2); }

.ms-seq {
  background:var(--seq-bg); color:var(--seq-color);
  border:1px solid var(--seq-border);
  border-radius:50px; font-size:0.68rem; font-weight:700;
  padding:2px 9px; flex-shrink:0;
}
.ms-edit-btn {
  background:none; border:none; color:var(--text2);
  cursor:pointer; padding:4px; font-size:0.82rem;
  border-radius:6px; transition:all 0.2s; flex-shrink:0;
}
.ms-edit-btn:hover { color:var(--accent); background:var(--ms-hover-bg); }

/* inline edit */
.ms-edit-row {
  display:flex; gap:7px; align-items:center;
  background:var(--bg); border:1.5px solid var(--accent);
  border-radius:var(--radius-sm); padding:9px 12px;
  margin-bottom:8px; animation:fadeSlide 0.2s ease;
}
.ms-edit-row input[type="text"] {
  flex:1; background:transparent; border:none;
  color:var(--text); font-size:0.88rem; font-family:inherit; outline:none;
}
.ms-edit-row input[type="number"] {
  background:transparent; border:1px solid var(--border);
  border-radius:6px; color:var(--accent); font-size:0.85rem;
  font-weight:700; font-family:inherit; width:44px;
  text-align:center; outline:none; padding:3px;
  -moz-appearance:textfield;
}
.ms-edit-row input[type="number"]::-webkit-outer-spin-button,
.ms-edit-row input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}
.btn-save-ms {
  background:var(--accent); border:none; color:#fff;
  border-radius:7px; padding:5px 12px;
  font-size:0.78rem; font-weight:700; cursor:pointer;
  font-family:inherit; transition:opacity 0.2s;
}
.btn-save-ms:hover { opacity:0.85; }

/* Finish button */
.task-finish-wrap {
  padding:0 14px 14px;
  display:none;
}
.task-card.open .task-finish-wrap { display:block; }
.btn-finish {
  width:100%; background:var(--btn-finish);
  border:none; color:#fff; border-radius:var(--radius-sm);
  padding:12px; font-size:0.92rem; font-weight:700;
  cursor:pointer; font-family:inherit;
  box-shadow:0 5px 16px var(--logo-shadow);
  transition:all 0.2s; letter-spacing:0.02em;
}
.btn-finish:hover { transform:translateY(-2px); filter:brightness(1.05); }

/* ══════════════════════════════════════
   MODAL
══════════════════════════════════════ */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.55);
  backdrop-filter:blur(8px); z-index:100;
  display:none; align-items:center; justify-content:center; padding:16px;
}
.modal-overlay.show { display:flex; }

.modal {
  background:#fff; border:1.5px solid var(--border);
  border-radius:var(--radius); padding:26px 22px;
  max-width:360px; width:100%;
  animation:popIn 0.3s cubic-bezier(.34,1.56,.64,1);
  text-align:center;
}
@keyframes popIn {
  from{opacity:0;transform:scale(0.8)}
  to{opacity:1;transform:scale(1)}
}
.modal-icon { font-size:2.8rem; margin-bottom:10px; }
.modal h2 { font-size:1.15rem; font-weight:800; margin-bottom:8px; color:var(--text); }
.modal p { font-size:0.85rem; color:var(--text2); line-height:1.6; }
.modal-list { list-style:none; margin:12px 0; text-align:start; }
.modal-list li {
  background:rgba(220,38,38,0.06); border:1px solid rgba(220,38,38,0.18);
  border-radius:8px; padding:8px 12px; margin-bottom:7px;
  font-size:0.83rem; color:var(--danger); font-weight:600;
  display:flex; align-items:center; gap:7px;
}
.btn-modal-close {
  margin-top:16px; background:var(--btn-create);
  border:none; color:#fff; border-radius:var(--radius-sm);
  padding:11px 30px; font-size:0.92rem; font-weight:700;
  cursor:pointer; font-family:inherit; transition:all 0.2s;
  box-shadow:0 5px 16px var(--logo-shadow);
}
.btn-modal-close:hover { transform:translateY(-2px); }
.congrats-modal h2 {
  font-size:1.4rem;
  background:linear-gradient(90deg,var(--accent),var(--accent3));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}

/* ══════════════════════════════════════
   CONFETTI
══════════════════════════════════════ */
.confetti-wrap { position:fixed; inset:0; pointer-events:none; z-index:200; overflow:hidden; }
.confetti-wrap.hidden { display:none; }
.confetti-piece {
  position:absolute; top:-20px; border-radius:2px;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall {
  0%{transform:translateY(0) rotate(0deg);opacity:1}
  80%{opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0}
}

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
.toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(80px);
  background:#fff; border:1.5px solid var(--border);
  color:var(--text); padding:10px 20px; border-radius:50px;
  font-size:0.82rem; font-weight:600; z-index:300;
  box-shadow:0 6px 20px var(--logo-shadow);
  transition:transform 0.35s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap; max-width:calc(100vw - 28px); text-align:center;
}
.toast.show { transform:translateX(-50%) translateY(0); }

/* ══════════════════════════════════════
   FOOTER
══════════════════════════════════════ */
.site-footer {
  position:relative; z-index:1;
  text-align:center; padding:18px 16px 26px;
  border-top:1.5px solid var(--border); margin-top:8px;
}
.footer-inner {
  display:inline-flex; align-items:center; gap:9px;
  background:#fff; border:1.5px solid var(--border);
  border-radius:50px; padding:9px 20px;
  box-shadow:var(--shadow);
}
.footer-heart { color:var(--accent); font-size:0.95rem; animation:hb 1.4s ease-in-out infinite; }
@keyframes hb { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
.footer-text { font-size:0.76rem; color:var(--text2); font-weight:600; }
.footer-text strong { color:var(--accent); font-weight:800; }
.footer-brand {
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  font-weight:800; font-size:0.78rem;
}

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */
@media(max-width:480px){
  .header { flex-direction:column; align-items:flex-start; }
  .header-actions { width:100%; justify-content:space-between; }
  .theme-toggle { flex:1; justify-content:center; }
  .milestone-row { grid-template-columns:1fr 48px 34px; }
  .task-name { font-size:0.88rem; }
  .task-row { gap:8px; padding:12px 13px; }
}
</style>
</head>
<body class="theme-girl">

<div class="confetti-wrap hidden" id="confettiWrap"></div>
<div class="toast" id="toast"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox">
    <div class="modal-icon" id="modalIcon">⚠️</div>
    <h2 id="modalTitle"></h2>
    <p id="modalMsg"></p>
    <ul class="modal-list" id="modalList"></ul>
    <button class="btn-modal-close" id="modalCloseBtn" onclick="closeModal()">OK</button>
  </div>
</div>

<div class="app">
  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon" id="logoIcon">✦</div>
      <div class="logo-text">
        <h1 id="appTitle">Milestone Tracker</h1>
        <p id="appSub">Plan. Execute. Celebrate. 🎉</p>
      </div>
    </div>
    <div class="header-actions">
      <!-- Theme toggler -->
      <div class="theme-toggle" id="themeToggle">
        <button class="theme-btn active" id="btnGirl" onclick="setTheme('girl')">🌸 <span id="girlLabel">Girl</span></button>
        <button class="theme-btn" id="btnBoy" onclick="setTheme('boy')">🚀 <span id="boyLabel">Boy</span></button>
      </div>
      <button class="btn-lang" onclick="toggleLang()" id="btnLang">عربي</button>
      <button class="btn-reset" onclick="confirmReset()" id="btnReset">🗑</button>
    </div>
  </div>

  <!-- CREATE TASK -->
  <div class="section-label" id="labelCreate">CREATE NEW TASK</div>
  <div class="create-card">
    <div class="input-group">
      <label id="labelTaskName">Task Name</label>
      <input type="text" id="taskNameInput" placeholder="e.g. Prepare for holiday trip"/>
    </div>
    <div class="milestones-builder">
      <label id="labelMilestones">Milestones</label>
      <div id="msRows"></div>
    </div>
    <button class="btn-add-ms" onclick="addMsRow()">＋ <span id="addMsText">Add Milestone</span></button>
    <button class="btn-create" onclick="createTask()" id="btnCreate">Create Task →</button>
  </div>

  <!-- TASKS -->
  <div class="section-label" id="labelTasks">MY TASKS</div>
  <div id="tasksList"></div>
</div>

<footer class="site-footer">
  <div class="footer-inner">
    <span class="footer-heart">♥</span>
    <span class="footer-text">Designed by <strong>Ali Karam</strong> &nbsp;·&nbsp; <span class="footer-brand">✦ Itqan Solutions</span></span>
  </div>
</footer>

<script>
// ══════════════════════════════════════
// i18n
// ══════════════════════════════════════
const i18n = {
  en: {
    appTitle:'Milestone Tracker', appSub:'Plan. Execute. Celebrate. 🎉',
    labelCreate:'CREATE NEW TASK', labelTaskName:'Task Name',
    labelMilestones:'Milestones', addMsText:'Add Milestone',
    btnCreate:'Create Task →', btnReset:'🗑', labelTasks:'MY TASKS',
    btnLang:'عربي', girlLabel:'Girl', boyLabel:'Boy',
    seqLabel:'#', msPH:'e.g. Book hotel', taskNamePH:'e.g. Prepare for holiday trip',
    finishBtn:'🏁 Mark as Complete',
    warnTitle:'Incomplete Milestones!', warnMsg:'Please complete these first:',
    warnClose:'Got it!', congratsTitle:'🎊 Task Complete!',
    congratsMsg:'Amazing! All milestones done. You crushed it! 💪',
    congratsClose:'Woohoo! 🥳', resetConfirmTitle:'Reset Everything?',
    resetConfirmMsg:'This will delete all tasks and milestones permanently.',
    resetConfirmClose:'Yes, Reset!',
    toastCreated:'✅ Task created!', toastDeleted:'🗑 Deleted',
    toastSaved:'💾 Saved!', noMsWarning:'Add at least one milestone!',
    noNameWarning:'Please enter a task name!', editSave:'✓',
  },
  ar: {
    appTitle:'متتبع المهام', appSub:'خطط. نفّذ. احتفل. 🎉',
    labelCreate:'إنشاء مهمة جديدة', labelTaskName:'اسم المهمة',
    labelMilestones:'المراحل', addMsText:'إضافة مرحلة',
    btnCreate:'إنشاء المهمة ←', btnReset:'🗑', labelTasks:'مهامي',
    btnLang:'English', girlLabel:'بنت', boyLabel:'ولد',
    seqLabel:'#', msPH:'مثال: حجز الفندق', taskNamePH:'مثال: الاستعداد للرحلة',
    finishBtn:'🏁 تعليم كمنجز',
    warnTitle:'مراحل غير مكتملة!', warnMsg:'يجب إكمال هذه المراحل أولاً:',
    warnClose:'حسناً!', congratsTitle:'🎊 تم إنجاز المهمة!',
    congratsMsg:'رائع! أتممت جميع المراحل بنجاح. 💪',
    congratsClose:'هورايا! 🥳', resetConfirmTitle:'إعادة تعيين الكل؟',
    resetConfirmMsg:'سيتم حذف جميع المهام والمراحل نهائياً.',
    resetConfirmClose:'نعم، إعادة تعيين!',
    toastCreated:'✅ تم إنشاء المهمة!', toastDeleted:'🗑 تم الحذف',
    toastSaved:'💾 تم الحفظ!', noMsWarning:'أضف مرحلة واحدة على الأقل!',
    noNameWarning:'يرجى إدخال اسم المهمة!', editSave:'✓',
  }
};

// ══════════════════════════════════════
// State
// ══════════════════════════════════════
let lang  = localStorage.getItem('msLang')  || 'en';
let theme = localStorage.getItem('msTheme') || 'girl';
let tasks = JSON.parse(localStorage.getItem('msTasks') || '[]');
let msRowCount = 0;

function t(k){ return i18n[lang][k] || k; }
function save(){ localStorage.setItem('msTasks', JSON.stringify(tasks)); }
function genId(){ return Math.random().toString(36).slice(2,10); }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ══════════════════════════════════════
// Theme
// ══════════════════════════════════════
function setTheme(t){
  theme = t;
  localStorage.setItem('msTheme', theme);
  applyTheme();
}
function applyTheme(){
  document.body.className = (lang==='ar'?'ar ':'') + 'theme-'+theme;
  document.getElementById('btnGirl').className = 'theme-btn' + (theme==='girl'?' active':'');
  document.getElementById('btnBoy').className  = 'theme-btn' + (theme==='boy' ?' active':'');
  document.getElementById('logoIcon').textContent = theme==='girl' ? '✦' : '⚡';
}

// ══════════════════════════════════════
// Language
// ══════════════════════════════════════
function toggleLang(){
  lang = lang==='en'?'ar':'en';
  localStorage.setItem('msLang', lang);
  applyLang();
  renderTasks();
}
function applyLang(){
  document.documentElement.lang = lang;
  document.documentElement.dir  = lang==='ar'?'rtl':'ltr';
  applyTheme();
  const keys = ['appTitle','appSub','labelCreate','labelTaskName','labelMilestones',
    'addMsText','btnCreate','btnReset','labelTasks','btnLang','girlLabel','boyLabel'];
  keys.forEach(k=>{ const el=document.getElementById(k); if(el) el.textContent=t(k); });
  document.getElementById('taskNameInput').placeholder = t('taskNamePH');
  document.querySelectorAll('.ms-name-input').forEach(i=>i.placeholder=t('msPH'));
}

// ══════════════════════════════════════
// Milestone Rows (form)
// ══════════════════════════════════════
function addMsRow(name='', seq=''){
  msRowCount++;
  const id='msr_'+msRowCount;
  const row=document.createElement('div');
  row.className='milestone-row'; row.id=id;
  row.innerHTML=`
    <input type="text" class="ms-name-input" placeholder="${t('msPH')}" value="${esc(name)}"/>
    <input type="number" class="seq-input" placeholder="${t('seqLabel')}" value="${seq}" min="1" max="999"/>
    <button class="btn-remove-ms" onclick="document.getElementById('${id}').remove()">✕</button>`;
  document.getElementById('msRows').appendChild(row);
}

// ══════════════════════════════════════
// Create Task
// ══════════════════════════════════════
function createTask(){
  const name=document.getElementById('taskNameInput').value.trim();
  if(!name){ showToast(t('noNameWarning')); return; }
  const rows=document.querySelectorAll('#msRows .milestone-row');
  if(!rows.length){ showToast(t('noMsWarning')); return; }
  const milestones=[];
  rows.forEach(r=>{
    const n=r.querySelector('.ms-name-input').value.trim();
    const s=parseInt(r.querySelector('.seq-input').value)||1;
    if(n) milestones.push({id:genId(),name:n,seq:s,done:false});
  });
  if(!milestones.length){ showToast(t('noMsWarning')); return; }
  milestones.sort((a,b)=>a.seq-b.seq);
  tasks.unshift({id:genId(),name,milestones,done:false,open:false});
  save();
  document.getElementById('taskNameInput').value='';
  document.getElementById('msRows').innerHTML='';
  msRowCount=0; addMsRow();
  renderTasks();
  showToast(t('toastCreated'));
}

// ══════════════════════════════════════
// Render
// ══════════════════════════════════════
function renderTasks(){
  const list=document.getElementById('tasksList');
  if(!tasks.length){
    list.innerHTML=`<div class="tasks-empty"><div class="ei">📋</div><p><b id="et"></b><br/><span style="opacity:.6" id="em"></span></p></div>`;
    document.getElementById('et').textContent = lang==='ar'?'لا توجد مهام بعد':'No tasks yet';
    document.getElementById('em').textContent = lang==='ar'?'أنشئ مهمتك الأولى للبدء!':'Create your first task above!';
    return;
  }
  list.innerHTML=tasks.map(renderTaskCard).join('');
}

function renderTaskCard(task){
  const total=task.milestones.length;
  const done=task.milestones.filter(m=>m.done).length;
  const pct=total?Math.round(done/total*100):0;
  const msHTML=task.milestones.map(ms=>renderMsItem(task.id,ms)).join('');
  return `
  <div class="task-card${task.open?' open':''}${task.done?' completed':''}" id="tc_${task.id}">
    <div class="task-row" onclick="toggleTask('${task.id}')">
      <div class="task-check${task.done?' done':''}"
           onclick="event.stopPropagation();finishTask('${task.id}')">${task.done?'✓':''}</div>
      <div class="task-meta">
        <div class="task-name${task.done?' striked':''}">${esc(task.name)}</div>
        <div class="ms-count-pill">
          <span>${done}/${total}</span>
          <div class="pbar"><div class="pbar-fill" style="width:${pct}%"></div></div>
          <span>${pct}%</span>
        </div>
      </div>
      <button class="btn-del" onclick="event.stopPropagation();deleteTask('${task.id}')" title="Delete">🗑</button>
      <span class="expand-icon">▼</span>
    </div>
    <div class="ms-panel" id="mp_${task.id}">
      <div id="ml_${task.id}">${msHTML}</div>
    </div>
    <div class="task-finish-wrap">
      <button class="btn-finish" onclick="finishTask('${task.id}')">${t('finishBtn')}</button>
    </div>
  </div>`;
}

function renderMsItem(taskId,ms){
  return `
  <div class="ms-item${ms.done?' ms-done':''}" id="msi_${ms.id}">
    <div class="ms-check" onclick="toggleMs('${taskId}','${ms.id}')">${ms.done?'✓':''}</div>
    <div class="ms-label" onclick="toggleMs('${taskId}','${ms.id}')">
      <div class="ms-name">${esc(ms.name)}</div>
    </div>
    <span class="ms-seq">${t('seqLabel')}${ms.seq}</span>
    <button class="ms-edit-btn" onclick="editMs('${taskId}','${ms.id}')">✏️</button>
  </div>`;
}

// ══════════════════════════════════════
// Toggle open/close
// ══════════════════════════════════════
function toggleTask(id){
  const task=tasks.find(t=>t.id===id); if(!task) return;
  task.open=!task.open; save();
  const card=document.getElementById('tc_'+id);
  if(card) card.classList.toggle('open',task.open);
}

// ══════════════════════════════════════
// Toggle Milestone
// ══════════════════════════════════════
function toggleMs(taskId,msId){
  const task=tasks.find(t=>t.id===taskId); if(!task) return;
  const ms=task.milestones.find(m=>m.id===msId); if(!ms) return;
  ms.done=!ms.done;
  task.done=task.milestones.every(m=>m.done);
  save(); patchTaskDOM(task);
}

function patchTaskDOM(task){
  const card=document.getElementById('tc_'+task.id); if(!card) return;
  const total=task.milestones.length;
  const done=task.milestones.filter(m=>m.done).length;
  const pct=total?Math.round(done/total*100):0;
  // pill
  const pill=card.querySelector('.ms-count-pill');
  if(pill) pill.innerHTML=`<span>${done}/${total}</span><div class="pbar"><div class="pbar-fill" style="width:${pct}%"></div></div><span>${pct}%</span>`;
  // name
  const tn=card.querySelector('.task-name');
  if(tn) tn.className='task-name'+(task.done?' striked':'');
  // check
  const ck=card.querySelector('.task-check');
  if(ck){ ck.className='task-check'+(task.done?' done':''); ck.textContent=task.done?'✓':''; }
  // completed class
  card.classList.toggle('completed',task.done);
  // re-render milestone list
  const ml=document.getElementById('ml_'+task.id);
  if(ml) ml.innerHTML=task.milestones.map(ms=>renderMsItem(task.id,ms)).join('');
}

// ══════════════════════════════════════
// Finish Task
// ══════════════════════════════════════
function finishTask(taskId){
  const task=tasks.find(t=>t.id===taskId); if(!task) return;
  const incomplete=task.milestones.filter(m=>!m.done).sort((a,b)=>a.seq-b.seq);
  if(incomplete.length){ showWarnModal(incomplete); return; }
  task.done=true; save(); patchTaskDOM(task);
  showCongratsModal(); launchConfetti();
}

// ══════════════════════════════════════
// Delete
// ══════════════════════════════════════
function deleteTask(id){
  tasks=tasks.filter(t=>t.id!==id); save(); renderTasks(); showToast(t('toastDeleted'));
}

// ══════════════════════════════════════
// Inline Edit Milestone
// ══════════════════════════════════════
function editMs(taskId,msId){
  const task=tasks.find(t=>t.id===taskId); if(!task) return;
  const ms=task.milestones.find(m=>m.id===msId); if(!ms) return;
  const el=document.getElementById('msi_'+msId); if(!el) return;
  el.outerHTML=`
  <div class="ms-edit-row" id="msi_${msId}">
    <input type="text" value="${esc(ms.name)}" id="me_n_${msId}" placeholder="${t('msPH')}"/>
    <input type="number" value="${ms.seq}" id="me_s_${msId}" min="1" max="999"/>
    <button class="btn-save-ms" onclick="saveMs('${taskId}','${msId}')">${t('editSave')}</button>
  </div>`;
  document.getElementById('me_n_'+msId)?.focus();
}

function saveMs(taskId,msId){
  const task=tasks.find(t=>t.id===taskId); if(!task) return;
  const ms=task.milestones.find(m=>m.id===msId); if(!ms) return;
  const n=document.getElementById('me_n_'+msId);
  const s=document.getElementById('me_s_'+msId);
  if(n) ms.name=n.value.trim()||ms.name;
  if(s) ms.seq=parseInt(s.value)||ms.seq;
  task.milestones.sort((a,b)=>a.seq-b.seq); save();
  const ml=document.getElementById('ml_'+taskId);
  if(ml) ml.innerHTML=task.milestones.map(m=>renderMsItem(taskId,m)).join('');
  showToast(t('toastSaved'));
}

// ══════════════════════════════════════
// Modals
// ══════════════════════════════════════
function showWarnModal(incomplete){
  document.getElementById('modalIcon').textContent='⚠️';
  document.getElementById('modalBox').className='modal';
  document.getElementById('modalTitle').textContent=t('warnTitle');
  document.getElementById('modalMsg').textContent=t('warnMsg');
  document.getElementById('modalList').innerHTML=incomplete.map(m=>
    `<li>⚡ ${esc(m.name)} <span style="opacity:.55;font-weight:400;margin-inline-start:4px">(#${m.seq})</span></li>`
  ).join('');
  document.getElementById('modalCloseBtn').textContent=t('warnClose');
  document.getElementById('modalCloseBtn').style.background='';
  document.getElementById('modalCloseBtn').onclick=closeModal;
  document.getElementById('modalOverlay').classList.add('show');
}

function showCongratsModal(){
  document.getElementById('modalIcon').textContent='🏆';
  document.getElementById('modalBox').className='modal congrats-modal';
  document.getElementById('modalTitle').textContent=t('congratsTitle');
  document.getElementById('modalMsg').textContent=t('congratsMsg');
  document.getElementById('modalList').innerHTML='';
  document.getElementById('modalCloseBtn').textContent=t('congratsClose');
  document.getElementById('modalCloseBtn').style.background='';
  document.getElementById('modalCloseBtn').onclick=closeModal;
  document.getElementById('modalOverlay').classList.add('show');
}

function confirmReset(){
  document.getElementById('modalIcon').textContent='🗑️';
  document.getElementById('modalBox').className='modal';
  document.getElementById('modalTitle').textContent=t('resetConfirmTitle');
  document.getElementById('modalMsg').textContent=t('resetConfirmMsg');
  document.getElementById('modalList').innerHTML='';
  document.getElementById('modalCloseBtn').textContent=t('resetConfirmClose');
  document.getElementById('modalCloseBtn').style.background='linear-gradient(135deg,#dc2626,#b91c1c)';
  document.getElementById('modalCloseBtn').onclick=doReset;
  document.getElementById('modalOverlay').classList.add('show');
}

function doReset(){
  tasks=[]; save();
  document.getElementById('taskNameInput').value='';
  document.getElementById('msRows').innerHTML='';
  msRowCount=0; addMsRow(); renderTasks(); closeModal();
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('show');
}

// ══════════════════════════════════════
// Confetti
// ══════════════════════════════════════
function launchConfetti(){
  const wrap=document.getElementById('confettiWrap');
  wrap.classList.remove('hidden'); wrap.innerHTML='';
  const girlColors=['#e0559a','#f48fb1','#a78bfa','#fb7bb8','#f9a8d4','#c084fc','#fda4af','#d946ef'];
  const boyColors=['#2563eb','#60a5fa','#0ea5e9','#06b6d4','#34d399','#fbbf24','#f87171','#a78bfa'];
  const colors=theme==='girl'?girlColors:boyColors;
  for(let i=0;i<90;i++){
    const c=document.createElement('div');
    c.className='confetti-piece';
    const col=colors[Math.floor(Math.random()*colors.length)];
    const size=6+Math.random()*10;
    const left=Math.random()*100;
    const dur=2.2+Math.random()*2;
    const delay=Math.random()*1.5;
    const br=['2px','50%','0'][Math.floor(Math.random()*3)];
    c.style.cssText=`left:${left}vw;width:${size}px;height:${size}px;background:${col};border-radius:${br};animation-duration:${dur}s;animation-delay:${delay}s;`;
    wrap.appendChild(c);
  }
  setTimeout(()=>{wrap.classList.add('hidden');wrap.innerHTML='';},5500);
}

// ══════════════════════════════════════
// Toast
// ══════════════════════════════════════
let toastTmr;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>el.classList.remove('show'),2500);
}

// ══════════════════════════════════════
// Init
// ══════════════════════════════════════
setTheme(theme);
applyLang();
addMsRow();
renderTasks();
</script>
</body>
</html>
